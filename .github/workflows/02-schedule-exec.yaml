# CI de Nível 02 - Disparo Agendado

# nome da pipeline
name: 'Scheduled Execution'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  #Cronograma de execução
  # 1 número - minuto, 2 numero - hora, 3 numero dia do mes, 4 numero - mês e o 5 numero - dia da semana
  schedule:
    - cron: '0 0 * * 0'
      timezone: 'America/Sao_Paulo'

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn

      # instalação dos Browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      # executar os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e
