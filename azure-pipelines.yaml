
trigger:
- master

pool:
  vmImage: ubuntu-latest

stages:
- stage: Passo1
  displayName: 'Instalações Necessárias'
  
  jobs:
  - job: Execution_Pipeline
    displayName: 'Validação do Pipeline de Testes'

    steps:
    - task: NodeTaskRunnerInstaller@0
      inputs:
        nodeVersion: '16'
      displayName: 'Instalar o Node.js'

    - script: npm install -g yarn
      displayName: 'instalação do Yarn'

    - script: yarn
      displayName: 'Instalando dependências'

    - script: yarn playwright install
      displayName: 'Instalando o playwright'

- stage: stage2
  displayName: 'Executando os Testes Automatizados'
  dependsOn: Passo1
  jobs:
  - job:
    steps:
    - script: yarn run e2e
      displayName: 'Executando testes e2e'
   
    - task: PublishTestResults@2
      inputs:
       testResultsFormat: 'JUnit'
       testResultsFiles: '**/TEST-*.xml'
       searchFolder: '.'
       testRunTitle: 'teste 1'